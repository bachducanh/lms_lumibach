# ── Database ────────────────────────────────────────────────────
POSTGRES_HOST=judge0-db
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0_secret
POSTGRES_DB=judge0

# ── Redis ───────────────────────────────────────────────────────
REDIS_URL=redis://judge0-redis:6379
REDIS_HOST=judge0-redis
REDIS_PORT=6379

# ── Security: tắt network trong sandbox ────────────────────────
ENABLE_NETWORK=false

# ── Cgroup v2 workaround (WSL2/Windows Docker Desktop) ──────────
# Judge0 1.13.1 truyền --cg vào isolate khi enable_per_process = false.
# Đặt cả hai = true để cgroups = "" → isolate chạy không cần cgroup v1.
# Thay vào đó dùng rlimit (-m) cho memory và wall time cho CPU.
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=true
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=true

# ── Resource limits (max per submission) ───────────────────────
MAX_CPU_TIME_LIMIT=10        # seconds
MAX_CPU_EXTRA_TIME=2
MAX_WALL_TIME_LIMIT=20       # seconds
MAX_MEMORY_LIMIT=524288      # KB = 512 MB
MAX_STACK_LIMIT=65536        # KB = 64 MB
MAX_MAX_PROCESSES_AND_OR_THREADS=30
MAX_NUMBER_OF_RUNS=20
MAX_FILE_SIZE=3072           # KB = 3 MB output
MAX_QUEUE_SIZE=100

# ── Default limits (applied if submission doesn't specify) ──────
CPU_TIME_LIMIT=5
WALL_TIME_LIMIT=10
MEMORY_LIMIT=262144          # KB = 256 MB
STACK_LIMIT=65536
MAX_PROCESSES_AND_OR_THREADS=10
NUMBER_OF_RUNS=1

# ── Workers ─────────────────────────────────────────────────────
COUNT_OF_WORKERS=2
